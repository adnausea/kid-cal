services:
  kid-cal:
    build: .
    container_name: kid-cal
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/data/kid-cal.db
    volumes:
      - kid-cal-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kid-cal-data:
